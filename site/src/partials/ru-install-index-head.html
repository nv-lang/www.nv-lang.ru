<style>
/* ── Install-page specific ──────────────────────────────────────────────── */
.os-tabs            { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.75rem; }
.os-tab             { padding:.45rem 1.1rem; border-radius:6px; border:1px solid var(--border);
                      font-size:.875rem; font-weight:500; cursor:pointer; background:var(--bg);
                      color:var(--fg-muted); transition:all .15s; }
.os-tab:hover       { border-color:var(--accent); color:var(--accent); }
.os-tab.active      { background:var(--accent); border-color:var(--accent); color:#fff; }

.os-panel           { display:none; }
.os-panel.active    { display:block; }

.step               { display:flex; gap:1.25rem; margin-bottom:2.5rem; }
.step__num          { flex-shrink:0; width:2rem; height:2rem; border-radius:50%;
                      background:var(--accent); color:#fff; display:flex;
                      align-items:center; justify-content:center;
                      font-size:.85rem; font-weight:700; margin-top:.15rem; }
.step__body         { flex:1; min-width:0; }
.step__body h3      { margin:0 0 .5rem; font-size:1rem; }
.step__body p       { margin:0 0 .75rem; color:var(--fg-muted); font-size:.9rem; }

.copy-block         { position:relative; }
.copy-block pre     { margin:0; padding:.9rem 3rem .9rem 1rem; background:var(--bg-code);
                      border:1px solid var(--border); border-radius:8px;
                      font-size:.875rem; overflow-x:auto; }
.copy-btn           { position:absolute; top:.55rem; right:.6rem; padding:.25rem .6rem;
                      font-size:.75rem; background:var(--bg); border:1px solid var(--border);
                      border-radius:5px; cursor:pointer; color:var(--fg-muted);
                      transition:all .15s; }
.copy-btn:hover     { border-color:var(--accent); color:var(--accent); }
.copy-btn.copied    { color:var(--success,#22c55e); border-color:var(--success,#22c55e); }

.verify-box         { background:var(--hero-bg); border:1px solid var(--border);
                      border-radius:8px; padding:1.25rem 1.5rem; margin-top:1rem; }
.verify-box h4      { margin:0 0 .5rem; font-size:.9rem; }
.verify-box pre     { margin:0; font-size:.82rem; color:var(--fg-muted); }

.next-steps         { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
                      gap:1rem; margin-top:2.5rem; }
.next-card          { background:var(--hero-bg); border:1px solid var(--border);
                      border-radius:10px; padding:1.25rem 1.5rem;
                      text-decoration:none; color:inherit; transition:all .15s;
                      display:flex; flex-direction:column; gap:.4rem; }
.next-card:hover    { border-color:var(--accent); transform:translateY(-2px);
                      box-shadow:0 4px 16px rgba(0,0,0,.08); }
.next-card__icon    { font-size:1.4rem; line-height:1; }
.next-card__title   { font-weight:600; font-size:.95rem; }
.next-card__desc    { font-size:.83rem; color:var(--fg-muted); }

.notice             { background:var(--hero-bg); border-left:3px solid var(--accent);
                      padding:.75rem 1rem; border-radius:0 6px 6px 0;
                      font-size:.875rem; color:var(--fg-muted); margin-bottom:1.5rem; }
.notice strong      { color:var(--fg); }

.reqs-grid          { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
                      gap:1rem; margin-bottom:2rem; }
.req-card           { border:1px solid var(--border); border-radius:8px;
                      padding:.9rem 1.1rem; font-size:.85rem; }
.req-card__label    { font-weight:600; margin-bottom:.25rem; }
.req-card__val      { color:var(--fg-muted); }
</style>
