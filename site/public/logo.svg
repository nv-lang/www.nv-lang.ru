<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 40" role="img" aria-label="Nova">
  <!-- Логотип Nova: символ «новой звезды» + словесный знак.
       Цвет берётся из дизайн-системы (accent #6b3fa0) и
       адаптируется к светлой/тёмной теме браузера. -->
  <style>
    .wm   { fill: #1a1a1a; }
    .sa   { stop-color: #8b5cf6; }
    .sb   { stop-color: #5d3494; }
    .spk  { fill: #7c4dc4; }
    @media (prefers-color-scheme: dark) {
      .wm  { fill: #e8e8ee; }
      .sa  { stop-color: #d4bbf2; }
      .sb  { stop-color: #a97dd1; }
      .spk { fill: #c2a0ea; }
    }
  </style>
  <defs>
    <linearGradient id="lg-star" x1="0.12" y1="0.05" x2="0.92" y2="0.96">
      <stop offset="0" class="sa"/>
      <stop offset="1" class="sb"/>
    </linearGradient>
  </defs>

  <!-- Символ -->
  <g transform="translate(4,4)">
    <path d="M24 5 Q24.8 7.1 27 7.9 Q24.8 8.7 24 10.8 Q23.2 8.7 21 7.9 Q23.2 7.1 24 5 Z"
          class="spk"/>
    <path d="M16 2.9 Q18.7 13.3 27.3 16 Q18.7 18.7 16 29.1 Q13.3 18.7 4.7 16 Q13.3 13.3 16 2.9 Z"
          fill="url(#lg-star)"/>
  </g>

  <!-- Словесный знак -->
  <text x="42" y="28.6" class="wm"
        font-family="system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif"
        font-size="25" font-weight="800" letter-spacing="-0.75">Nova</text>
</svg>
