name: Build & deploy nv-lang.ru mirror

# Зеркало nv-lang.ru: собирает Astro-сайт из апстрима nv-lang/www,
# применяет .ru-специфичный post-process (CNAME, ru-RU hreflang,
# sitemap URL), деплоит через GitHub Pages API.
#
# Главное изменение vs prior version: main .ru НЕ загрязняется
# auto-commit'ами. Pages mode должен быть "GitHub Actions"
# (см. SETUP ниже).
#
# Реализует план www-05 (rev 2): nv-lang/www/plans/www-05-ru-mirror-seo.md
#
on:
  schedule:
    - cron: '*/15 * * * *'   # каждые 15 минут — auto-rebuild при изменениях в .org
  workflow_dispatch:

permissions:
  contents: read    # не пушим в main — только читаем для checkout
  pages: write      # для actions/deploy-pages
  id-token: write   # для OIDC при deploy-pages

concurrency:
  group: deploy-mirror
  cancel-in-progress: false   # let in-flight deploys finish

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream nv-lang/www
        uses: actions/checkout@v4
        with:
          repository: nv-lang/www
          ref: main
          path: upstream

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: upstream/site/package-lock.json

      - name: Install dependencies
        working-directory: upstream/site
        run: npm ci

      - name: Build Astro site
        working-directory: upstream/site
        run: npm run build

      - name: Post-process dist for .ru mirror
        # 1. CNAME → nv-lang.ru (override .org CNAME)
        # 2. Inject <link rel="alternate" hreflang="ru-RU" href="https://nv-lang.ru/{path}">
        #    в каждый HTML с canonical, после x-default hreflang.
        #    Skip: 404.html, страницы с noindex, страницы без canonical.
        # 3. Sitemap.xml: replace nv-lang.org → nv-lang.ru для отдельной
        #    submission в Google Search Console .ru property.
        run: |
          set -euo pipefail
          DIST=upstream/site/dist

          # 1) CNAME
          echo "nv-lang.ru" > "$DIST/CNAME"

          # 2) Inject ru-RU hreflang
          find "$DIST" -type f -name '*.html' \
              -not -name '404.html' \
              | while IFS= read -r f; do
            # Skip если уже есть (идемпотентность)
            if grep -q 'hreflang="ru-RU"' "$f"; then
              continue
            fi
            # Skip noindex
            if grep -qE 'name="robots"[^>]*content="[^"]*noindex' "$f"; then
              continue
            fi
            # Извлечь canonical path
            canonical=$(grep -oE '<link rel="canonical" href="https://nv-lang\.org[^"]*"' "$f" | head -1 || true)
            if [ -z "$canonical" ]; then
              continue
            fi
            path=$(echo "$canonical" | sed -E 's|<link rel="canonical" href="https://nv-lang\.org([^"]*)".*|\1|')
            ru_url="https://nv-lang.ru${path}"
            # Вставить после x-default
            sed -i "s|<link rel=\"alternate\" hreflang=\"x-default\"[^>]*>|&<link rel=\"alternate\" hreflang=\"ru-RU\" href=\"${ru_url}\">|" "$f"
          done

          # 3) Sitemap URL swap
          if [ -f "$DIST/sitemap.xml" ]; then
            sed -i 's|https://nv-lang\.org|https://nv-lang.ru|g' "$DIST/sitemap.xml"
          fi

          # Sanity check
          echo "::group::Built artifacts summary"
          echo "HTML pages: $(find $DIST -name '*.html' | wc -l)"
          echo "Pages with ru-RU hreflang: $(grep -lr 'hreflang="ru-RU"' $DIST 2>/dev/null | wc -l)"
          echo "CNAME: $(cat $DIST/CNAME)"
          echo "::endgroup::"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: upstream/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
