<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent glow -->
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="none" stroke="#0070f3" stroke-width="1" opacity="0.15"/>
  <ellipse cx="600" cy="315" rx="300" ry="180" fill="#0070f318"/>

  <!-- Logo "N" badge -->
  <rect x="72" y="60" width="80" height="80" rx="16" fill="#0070f3"/>
  <text x="112" y="118" font-family="system-ui,-apple-system,sans-serif" font-size="52"
        font-weight="700" fill="#ffffff" text-anchor="middle">N</text>

  <!-- Main title -->
  <text x="72" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="80"
        font-weight="700" fill="#ffffff" letter-spacing="-2">Nova</text>

  <!-- Tagline -->
  <text x="72" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="28"
        fill="#8892a4" font-weight="400">General-purpose systems language</text>

  <!-- Feature pills -->
  <rect x="72" y="370" width="190" height="40" rx="20" fill="#0070f320" stroke="#0070f360" stroke-width="1"/>
  <text x="167" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="16"
        fill="#60a8ff" text-anchor="middle" font-weight="500">Algebraic Effects</text>

  <rect x="278" y="370" width="170" height="40" rx="20" fill="#0070f320" stroke="#0070f360" stroke-width="1"/>
  <text x="363" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="16"
        fill="#60a8ff" text-anchor="middle" font-weight="500">Static Contracts</text>

  <rect x="464" y="370" width="150" height="40" rx="20" fill="#0070f320" stroke="#0070f360" stroke-width="1"/>
  <text x="539" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="16"
        fill="#60a8ff" text-anchor="middle" font-weight="500">M:N Runtime</text>

  <!-- URL -->
  <text x="72" y="560" font-family="system-ui,-apple-system,sans-serif" font-size="22"
        fill="#4a5568" font-weight="400">nv-lang.org</text>

  <!-- Code snippet decoration -->
  <rect x="730" y="120" width="400" height="390" rx="12" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <rect x="730" y="120" width="400" height="36" rx="12" fill="#1f2937"/>
  <rect x="730" y="144" width="400" height="12" fill="#1f2937"/>
  <circle cx="756" cy="138" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="778" cy="138" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="800" cy="138" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Code lines -->
  <rect x="754" y="178" width="100" height="10" rx="2" fill="#0070f3" opacity="0.7"/>
  <rect x="862" y="178" width="60" height="10" rx="2" fill="#a78bfa" opacity="0.7"/>
  <rect x="754" y="208" width="80" height="10" rx="2" fill="#34d399" opacity="0.7"/>
  <rect x="842" y="208" width="110" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="770" y="238" width="150" height="10" rx="2" fill="#fb923c" opacity="0.7"/>
  <rect x="754" y="268" width="180" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="770" y="298" width="120" height="10" rx="2" fill="#60a8ff" opacity="0.7"/>
  <rect x="754" y="328" width="90" height="10" rx="2" fill="#34d399" opacity="0.7"/>
  <rect x="754" y="358" width="200" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="770" y="388" width="140" height="10" rx="2" fill="#fb923c" opacity="0.7"/>
  <rect x="754" y="418" width="60" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="754" y="448" width="100" height="10" rx="2" fill="#0070f3" opacity="0.7"/>
  <rect x="754" y="478" width="40" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
</svg>
