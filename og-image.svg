<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0b0a12"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
    <linearGradient id="og-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b1b41"/>
      <stop offset="1" stop-color="#130c20"/>
    </linearGradient>
    <radialGradient id="og-halo" gradientUnits="userSpaceOnUse" cx="16" cy="15" r="13">
      <stop offset="0"    stop-color="#cdaaf3" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#8a5fcf" stop-opacity="0.22"/>
      <stop offset="1"    stop-color="#8a5fcf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-star" x1="0.15" y1="0.08" x2="0.9" y2="0.95">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f0e6fb"/>
      <stop offset="1"    stop-color="#c2a0ea"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent glow -->
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="none" stroke="#6b3fa0" stroke-width="1" opacity="0.15"/>
  <ellipse cx="600" cy="315" rx="300" ry="180" fill="#6b3fa018"/>

  <!-- Nova symbol — «новая звезда» -->
  <g transform="translate(72,60) scale(2.5)">
    <rect width="32" height="32" rx="7" fill="url(#og-tile)"/>
    <rect width="32" height="32" rx="7" fill="url(#og-halo)"/>
    <path d="M24 5 Q24.8 7.1 27 7.9 Q24.8 8.7 24 10.8 Q23.2 8.7 21 7.9 Q23.2 7.1 24 5 Z"
          fill="#ffffff" opacity="0.85"/>
    <path d="M16 2.9 Q18.7 13.3 27.3 16 Q18.7 18.7 16 29.1 Q13.3 18.7 4.7 16 Q13.3 13.3 16 2.9 Z"
          fill="url(#og-star)"/>
    <circle cx="16" cy="16" r="2" fill="#ffffff"/>
    <rect x="0.6" y="0.6" width="30.8" height="30.8" rx="6.4" fill="none"
          stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- Main title -->
  <text x="72" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="80"
        font-weight="700" fill="#ffffff" letter-spacing="-2">Nova</text>

  <!-- Tagline -->
  <text x="72" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="28"
        fill="#8892a4" font-weight="400">General-purpose systems language</text>

  <!-- Feature pills -->
  <rect x="72" y="370" width="190" height="40" rx="20" fill="#6b3fa033" stroke="#6b3fa080" stroke-width="1"/>
  <text x="167" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="16"
        fill="#c2a0ea" text-anchor="middle" font-weight="500">Algebraic Effects</text>

  <rect x="278" y="370" width="170" height="40" rx="20" fill="#6b3fa033" stroke="#6b3fa080" stroke-width="1"/>
  <text x="363" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="16"
        fill="#c2a0ea" text-anchor="middle" font-weight="500">Static Contracts</text>

  <rect x="464" y="370" width="150" height="40" rx="20" fill="#6b3fa033" stroke="#6b3fa080" stroke-width="1"/>
  <text x="539" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="16"
        fill="#c2a0ea" text-anchor="middle" font-weight="500">M:N Runtime</text>

  <!-- URL -->
  <text x="72" y="560" font-family="system-ui,-apple-system,sans-serif" font-size="22"
        fill="#4a5568" font-weight="400">nv-lang.org</text>

  <!-- Code snippet decoration -->
  <rect x="730" y="120" width="400" height="390" rx="12" fill="#15131d" stroke="#2a2535" stroke-width="1"/>
  <rect x="730" y="120" width="400" height="36" rx="12" fill="#2a2535"/>
  <rect x="730" y="144" width="400" height="12" fill="#2a2535"/>
  <circle cx="756" cy="138" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="778" cy="138" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="800" cy="138" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Code lines -->
  <rect x="754" y="178" width="100" height="10" rx="2" fill="#6b3fa0" opacity="0.8"/>
  <rect x="862" y="178" width="60" height="10" rx="2" fill="#a78bfa" opacity="0.8"/>
  <rect x="754" y="208" width="80" height="10" rx="2" fill="#34d399" opacity="0.7"/>
  <rect x="842" y="208" width="110" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="770" y="238" width="150" height="10" rx="2" fill="#fb923c" opacity="0.7"/>
  <rect x="754" y="268" width="180" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="770" y="298" width="120" height="10" rx="2" fill="#c2a0ea" opacity="0.8"/>
  <rect x="754" y="328" width="90" height="10" rx="2" fill="#34d399" opacity="0.7"/>
  <rect x="754" y="358" width="200" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="770" y="388" width="140" height="10" rx="2" fill="#fb923c" opacity="0.7"/>
  <rect x="754" y="418" width="60" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
  <rect x="754" y="448" width="100" height="10" rx="2" fill="#6b3fa0" opacity="0.8"/>
  <rect x="754" y="478" width="40" height="10" rx="2" fill="#8892a4" opacity="0.5"/>
</svg>
