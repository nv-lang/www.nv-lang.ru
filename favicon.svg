<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Nova">
  <!-- Nova — символ языка: «новая звезда», вспышка света.
       Палитра берётся из дизайн-системы сайта: --accent #6b3fa0. -->
  <defs>
    <linearGradient id="nv-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b1b41"/>
      <stop offset="1" stop-color="#130c20"/>
    </linearGradient>
    <radialGradient id="nv-halo" gradientUnits="userSpaceOnUse" cx="16" cy="15" r="13">
      <stop offset="0"    stop-color="#cdaaf3" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#8a5fcf" stop-opacity="0.22"/>
      <stop offset="1"    stop-color="#8a5fcf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nv-star" x1="0.15" y1="0.08" x2="0.9" y2="0.95">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f0e6fb"/>
      <stop offset="1"    stop-color="#c2a0ea"/>
    </linearGradient>
  </defs>

  <!-- Тайл — глубокий космос -->
  <rect width="32" height="32" rx="7" fill="url(#nv-tile)"/>
  <rect width="32" height="32" rx="7" fill="url(#nv-halo)"/>

  <!-- Спутник-искра -->
  <path d="M24 5 Q24.8 7.1 27 7.9 Q24.8 8.7 24 10.8 Q23.2 8.7 21 7.9 Q23.2 7.1 24 5 Z"
        fill="#ffffff" opacity="0.85"/>

  <!-- Главная звезда — nova -->
  <path d="M16 2.9 Q18.7 13.3 27.3 16 Q18.7 18.7 16 29.1 Q13.3 18.7 4.7 16 Q13.3 13.3 16 2.9 Z"
        fill="url(#nv-star)"/>

  <!-- Раскалённое ядро -->
  <circle cx="16" cy="16" r="2" fill="#ffffff"/>

  <!-- Тонкая кромка тайла -->
  <rect x="0.6" y="0.6" width="30.8" height="30.8" rx="6.4" fill="none"
        stroke="#ffffff" stroke-opacity="0.08"/>
</svg>
